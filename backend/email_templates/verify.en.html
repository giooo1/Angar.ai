<!doctype html>
<html lang="en">
  <body style="font-family: -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif; background: #f6f3ee; padding: 40px 0; color: #0e1116;">
    <table width="520" align="center" cellpadding="0" cellspacing="0" style="background: #ffffff; border: 1px solid #dbd5c8; border-radius: 12px; padding: 32px;">
      <tr>
        <td>
          <h1 style="font-family: Georgia, serif; font-size: 26px; font-weight: 500; margin: 0 0 12px 0; color: #0e1116;">
            Verify your email
          </h1>
          <p style="margin: 0 0 20px 0; line-height: 1.5; color: #3b424c;">
            Hi {{ name }} — confirm this address so we can keep your account safe and enable billing.
          </p>
          <p style="margin: 24px 0;">
            <a href="{{ link }}"
               style="display: inline-block; padding: 12px 22px; background: #1a3d2e; color: #ffffff; border-radius: 8px; text-decoration: none; font-weight: 500;">
              Verify email
            </a>
          </p>
          <p style="margin: 18px 0 0 0; font-size: 13px; color: #7b8290;">
            Or paste this link into your browser:<br>
            <span style="word-break: break-all; color: #1a3d2e;">{{ link }}</span>
          </p>
          <p style="margin: 22px 0 0 0; font-size: 12px; color: #aeb3bd;">
            If you didn't sign up for Angar.ai, you can ignore this email.
          </p>
        </td>
      </tr>
    </table>
  </body>
</html>
