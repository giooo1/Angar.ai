<!doctype html>
<html lang="en">
  <body style="font-family: -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif; background: #f6f3ee; padding: 40px 0; color: #0e1116;">
    <table width="520" align="center" cellpadding="0" cellspacing="0" style="background: #ffffff; border: 1px solid #dbd5c8; border-radius: 12px; padding: 32px;">
      <tr>
        <td>
          <h1 style="font-family: Georgia, serif; font-size: 26px; font-weight: 500; margin: 0 0 12px 0; color: #0e1116;">
            Receipt — Angar.ai {{ plan }}
          </h1>
          <p style="margin: 0 0 20px 0; line-height: 1.5; color: #3b424c;">
            Hi {{ name }} — thanks for your subscription. Here are the details.
          </p>
          <table cellpadding="6" cellspacing="0" style="margin: 12px 0 20px 0; font-size: 14px; color: #0e1116; border-collapse: collapse;">
            <tr>
              <td style="color: #7b8290; padding-right: 18px;">Plan</td>
              <td>{{ plan }}</td>
            </tr>
            <tr>
              <td style="color: #7b8290; padding-right: 18px;">Period</td>
              <td>{{ period_start }} → {{ period_end }}</td>
            </tr>
            <tr>
              <td style="color: #7b8290; padding-right: 18px;">Amount</td>
              <td style="font-weight: 500;">{{ amount }}</td>
            </tr>
          </table>
          <p style="margin: 22px 0 0 0; font-size: 12px; color: #aeb3bd;">
            Manage your subscription from the billing page in your Angar.ai dashboard.
          </p>
        </td>
      </tr>
    </table>
  </body>
</html>
